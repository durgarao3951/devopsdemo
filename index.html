<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:#f0f4f8;
}

header{
    background:#004080;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:900px;
    margin:40px auto;
    display:flex;
    justify-content:space-between;
}

.box{
    width:420px;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    color:#004080;
    margin-bottom:20px;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#004080;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0066cc;
}

footer{
    margin-top:40px;
    background:#004080;
    color:white;
    text-align:center;
    padding:15px;
}

</style>

</head>

<body>

<header>
<img src="images/company-logo.png" width="120">
<h1>SBR Global Traders <h1>
<p>Employee Registration & Login Portal</p>
</header>

<div class="container">

<div class="box">

<h2>Employee Registration</h2>

<form action="#">

<input type="text" placeholder="Employee ID" required>

<input type="text" placeholder="Employee Name" required>

<input type="email" placeholder="Email Address" required>

<input type="tel" placeholder="Mobile Number" required>

<input type="password" placeholder="Create Password" required>

<button type="submit">Register</button>

</form>

</div>

<div class="box">

<h2>Employee Login</h2>

<form action="#">

<input type="text" placeholder="Employee ID" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

</div>

</div>

<footer>

Copyright © 2026 SBR Global Traders

</footer>

</body>
</html>
